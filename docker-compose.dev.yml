# Full development stack: PostgreSQL + Mosquitto + ArangoDB
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d           # Start all services
#   docker compose -f docker-compose.dev.yml up -d postgres mosquitto  # PG-only mode
#   docker compose -f docker-compose.dev.yml down -v         # Stop and wipe volumes

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    command: mosquitto -c /dev/null -p 1883 -v
    # Anonymous connections allowed for development

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ephemeris
      POSTGRES_PASSWORD: ephemeris
      POSTGRES_DB: ephemeris
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ephemeris"]
      interval: 2s
      timeout: 5s
      retries: 10

  arangodb:
    image: arangodb:3.12
    environment:
      ARANGO_ROOT_PASSWORD: ephemeris
    ports:
      - "8529:8529"
    volumes:
      - arango_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  arango_data:
