# Docker Compose for local development and manual E2E testing.
# Integration tests use testcontainers (no compose needed).
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   cargo run -- --config ephemeris.toml
#   docker compose -f docker-compose.test.yml down

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    command: mosquitto -c /dev/null -p 1883 -v
    # Allows anonymous connections for development

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ephemeris
      POSTGRES_PASSWORD: ephemeris
      POSTGRES_DB: ephemeris
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
